<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>BI系统入口</title>

<style>
/* ★ HarmonyOS Sans SC フォントをインポート */
@import url('https://fonts.googleapis.com/css2?family=HarmonyOS+Sans+SC:wght@400;500;700&display=swap');

body{
    margin:0;
    font-family: "HarmonyOS Sans SC", "Segoe UI", "Microsoft YaHei", sans-serif;
}

/* 顶部 */
.header{
    height:60px;
    background:#7566A6;
}

/* 布局 */
.container{
    display:flex;
    height:calc(100vh - 60px);
}

/* 左侧菜单 */
.sidebar{
    width:220px;
    background:#e5e5e5;
    padding:20px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
}

.menu{
    flex:1;
}

/* ★ すべてのメニュー項目に HarmonyOS Sans SC Medium (font-weight:500) を適用 */
.menu div{
    padding:12px;
    margin-bottom:10px;
    cursor:pointer;
    border-radius:6px;
    font-size:16px;
    transition: 0.15s;
    font-family: "HarmonyOS Sans SC", sans-serif;
    font-weight: 500; /* Medium */
}

.menu div:hover{
    background:#d0d0d0;
}

.menu .active{
    background:#c5b8d9;
    font-weight: 500; /* Medium を維持 */
}

/* 区切り線 */
.menu .divider{
    height:1px;
    background:#ccc;
    margin:12px 0;
    cursor:default;
    pointer-events:none;
}
.menu .divider:hover{
    background:#ccc;
}

/* ★ セクションラベルも HarmonyOS Sans SC Medium */
.menu .section-label{
    font-size:12px;
    font-weight: 500; /* Medium */
    color:#888;
    padding:4px 8px 8px 8px;
    letter-spacing:0.5px;
    cursor:default;
    pointer-events:none;
    font-family: "HarmonyOS Sans SC", sans-serif;
}
.menu .section-label:hover{
    background:transparent;
}

/* 右侧 */
.content{
    flex:1;
    height:100%;
}

/* iframe */
iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<div class="header"></div>

<div class="container">

<!-- 左菜单 -->
<div class="sidebar">
    <div class="menu">
        <!-- 既存メニュー -->
        <div onclick="loadPage('crm.html')">📈 ダッシュボード</div>
        <div onclick="loadPage('Per.html')">📊 パフォーマンス</div>
        <div onclick="loadPage('util.html')">📉 稼働率</div>
        <div onclick="loadPage('profit.html')">💰 FI関連</div>

        <!-- 区切り線 -->
        <div class="divider"></div>

        <!-- 追加メニュー -->
        <div class="section-label">📌 施策・運営</div>
        <div onclick="loadPage('shop.html')">🏪 商店街施策</div>
        <div onclick="loadPage('operation.html')">⚙️ 運営部作業</div>
    </div>
</div>

<!-- 右内容 -->
<div class="content">
    <iframe id="frame" src="crm.html"></iframe>
</div>

</div>

<script>
function loadPage(page){
    document.getElementById("frame").src = page;

    // アクティブ切り替え
    const items = document.querySelectorAll('.menu div');
    items.forEach(el => {
        el.classList.remove('active');
    });
}

// クリックイベントでactiveを正しく付与
document.querySelector('.menu').addEventListener('click', function(e) {
    const div = e.target.closest('div');
    if (!div) return;
    if (div.classList.contains('divider') || div.classList.contains('section-label')) return;
    this.querySelectorAll('div').forEach(el => el.classList.remove('active'));
    div.classList.add('active');
});

// 初期表示時に最初の項目をactiveに
document.addEventListener('DOMContentLoaded', function() {
    const first = document.querySelector('.menu div:not(.divider):not(.section-label)');
    if (first) first.classList.add('active');
});
</script>

</body>
</html>
