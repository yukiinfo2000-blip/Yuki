<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>BI系统入口</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI","Microsoft YaHei";
}

/* 顶部 */
.header{
    height:60px;
    background:#7566A6;
}

/* 布局 */
.container{
    display:flex;
    height:calc(100vh - 60px);
}

/* 左侧菜单 */
.sidebar{
    width:220px;
    background:#e5e5e5;
    padding:20px;
}

.menu div{
    padding:12px;
    margin-bottom:10px;
    cursor:pointer;
    border-radius:6px;
    font-size:16px;
}

.menu div:hover{
    background:#d0d0d0;
}

/* 右侧 */
.content{
    flex:1;
    height:100%;
}

/* iframe */
iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>

</head>

<body>

<div class="header"></div>

<div class="container">

<!-- 左菜单 -->
<div class="sidebar">
    <div class="menu">
        <div onclick="loadPage('crm.html')">CRM Dashboard</div>
        <div>Performance（準備中）</div>
        <div onclick="loadPage('util.html')"><b>Utilization Rate</b></div>
        <div onclick="loadPage('profit.html')">Profit</div>
    </div>
</div>

<!-- 右内容 -->
<div class="content">
    <iframe id="frame" src="crm.html"></iframe>
</div>

</div>

<script>
function loadPage(page){
    document.getElementById("frame").src = page;
}
</script>

</body>
</html>
