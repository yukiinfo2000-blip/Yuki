<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2026稼働率</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
  <style>
    /* ----- ルート変数（元のスタイルを継承） ----- */
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --border: #e7ebf2;
      --text: #18253d;
      --sub: #7d8799;
      --blue: #5c93ff;
      --green: #62c26f;
      --red: #ff6b6b;
      --shadow: 0 2px 10px rgba(15,23,42,0.04);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      font-family: "Segoe UI", "Hiragino Sans", "Microsoft YaHei", sans-serif;
      color: var(--text);
      padding: 14px;
    }

    /* ----- ヘッダー ----- */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .header-left h1 {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }

    .header-left p {
      margin-top: 4px;
      color: var(--sub);
      font-size: 11px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .header-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      box-shadow: var(--shadow);
    }

    .header-label {
      font-size: 10px;
      color: var(--sub);
      margin-bottom: 4px;
    }

    select {
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 0 12px;
      font-size: 12px;
      color: #111827;
      min-width: 100px;
    }

    button {
      height: 38px;
      border: none;
      border-radius: 10px;
      background: #1d3c78;
      color: #fff;
      padding: 0 18px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover { opacity: 0.92; }

    /* ----- レイアウト ----- */
    .wrapper { width: 100%; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    /* ----- 年間チャート ----- */
    .year-card { margin-bottom: 14px; }
    .year-title {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .year-chart { height: 240px; }

    /* ----- 月別グリッド ----- */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .month-card {
      position: relative;
      transition: 0.25s;
    }
    .month-card.active {
      border: 1px solid rgba(92,147,255,0.25);
      box-shadow: 0 8px 24px rgba(92,147,255,0.12);
      transform: translateY(-2px);
    }

    .month-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .month-title {
      font-size: 14px;
      font-weight: 800;
    }
    .month-badge {
      font-size: 10px;
      color: #fff;
      background: var(--blue);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .chart-box { height: 220px; }

    /* ----- 情報ボックス ----- */
    .info-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .info-box {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
    }
    .info-label {
      font-size: 10px;
      color: var(--sub);
      margin-bottom: 4px;
    }
    .info-value {
      font-size: 18px;
      font-weight: 800;
    }
    .info-value.blue { color: var(--blue); }
    .info-value.green { color: var(--green); }

    /* ----- モバイル ----- */
    @media(max-width:1100px) {
      .grid { grid-template-columns: 1fr; }
      .header { flex-direction: column; }
      .header-right { width: 100%; }
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div class="header-left">
    <h1>2026稼働率</h1>
    <p>パフォーマンス概要</p>
  </div>
  <div class="header-right">
    <div class="header-card">
      <div class="header-label">開始月</div>
      <select id="startMonth"></select>
    </div>
    <div class="header-card">
      <div class="header-label">終了月</div>
      <select id="endMonth"></select>
    </div>
    <button onclick="search()">↻ データ照会</button>
  </div>
</div>

<div class="wrapper">
  <!-- 年間チャート -->
  <div class="card year-card">
    <div class="year-title">年間稼働率推移</div>
    <div class="year-chart">
      <canvas id="yearChart"></canvas>
    </div>
  </div>

  <!-- 月別カード -->
  <div class="grid" id="charts"></div>
</div>

<script>
  // ---------- 設定 ----------
  const URL = "https://ieijoczgnndiqmowadty.supabase.co";
  const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllaWpvY3pnbm5kaXFtb3dhZHR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMDM4MzksImV4cCI6MjA4ODc3OTgzOX0.vkhnClBek5ZZvJfW9fZwRpKnAVRViTd3EJOsWOJNuwg";
  let allData = [];
  let today = new Date();

  Chart.defaults.font.family = "'Segoe UI','Hiragino Sans','Microsoft YaHei'";
  Chart.defaults.color = "#6b7280";

  // ---------- データ取得 ----------
  async function getData() {
    const res = await fetch(`${URL}/rest/v1/utilization_daily?select=*`, {
      headers: { apikey: KEY, Authorization: "Bearer " + KEY }
    });
    return await res.json();
  }

  // ---------- 月ごとにグループ化 ----------
  function group(data) {
    const m = {};
    data.forEach(d => {
      const month = new Date(d.stat_date).getMonth() + 1;
      if (!m[month]) m[month] = [];
      m[month].push(d);
    });
    return m;
  }

  // ---------- グラデーション補助 ----------
  function gradient(ctx, color) {
    const g = ctx.createLinearGradient(0, 0, 0, 260);
    g.addColorStop(0, color);
    g.addColorStop(1, "rgba(255,255,255,0)");
    return g;
  }

  // ---------- チャート生成（実績＋予測＋最大稼働率） ----------
  function createChart(canvas, labels, real, forecast, maxArr, highlightIndex) {
    const ctx = canvas.getContext("2d");

    // 最大稼働率用データ（実績がある日のみプロット、それ以外は null）
    const maxData = labels.map((_, idx) => {
      // 実績が存在する日のみ最大値を表示（予測日は表示しない）
      return (real[idx] !== null && real[idx] !== undefined) ? maxArr[idx] : null;
    });

    new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: '実績',
            data: real,
            borderColor: '#5c93ff',
            backgroundColor: gradient(ctx, "rgba(92,147,255,0.18)"),
            fill: true,
            tension: 0.35,
            borderWidth: 2,
            pointRadius: (c) => c.dataIndex === highlightIndex ? 6 : 3,
            pointBackgroundColor: (c) => c.dataIndex === highlightIndex ? '#ff6b6b' : '#5c93ff',
            pointBorderWidth: 2,
            pointBorderColor: '#fff'
          },
          {
            label: '予測',
            data: forecast,
            borderColor: '#ff6b6b',
            backgroundColor: gradient(ctx, "rgba(255,107,107,0.10)"),
            fill: true,
            borderDash: [6, 6],
            tension: 0.35,
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: '#fff',
            pointBorderColor: '#ff6b6b',
            pointBorderWidth: 1.5
          },
          // ★ 最大稼働率（緑色の線） ★
          {
            label: '最大稼働率',
            data: maxData,
            borderColor: '#2ecc71',
            backgroundColor: 'rgba(46, 204, 113, 0.05)',
            borderWidth: 2.5,
            pointRadius: 4,
            pointBackgroundColor: '#2ecc71',
            pointBorderColor: '#fff',
            pointBorderWidth: 1.5,
            tension: 0.2,
            fill: false,
            borderDash: [4, 4]
          }
        ]
      },
      options: {
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            position: 'top',
            align: 'start',
            labels: {
              boxWidth: 10,
              usePointStyle: true,
              pointStyle: 'circle',
              font: { size: 10 }
            }
          },
          datalabels: {
            align: 'top',
            anchor: 'end',
            color: '#4b5563',
            font: { size: 9, weight: '700' },
            formatter: v => (v !== null && v !== undefined) ? v.toFixed(1) + '%' : ''
          }
        },
        scales: {
          x: {
            grid: { color: '#eef2f7' },
            ticks: { font: { size: 9 } }
          },
          y: {
            beginAtZero: true,
            grid: { color: '#eef2f7' },
            ticks: { callback: v => v + '%', font: { size: 9 } }
          }
        }
      },
      plugins: [ChartDataLabels]
    });
  }

  // ---------- 年間チャート描画（最大稼働率を月単位で追加） ----------
  function drawYear(data) {
    const labels = [];
    const real = [];
    const forecast = [];
    const maxArr = [];   // 各月の最大稼働率（実績日のみ）
    const nowMonth = today.getMonth() + 1;

    for (let m = 1; m <= 12; m++) {
      const arr = data.filter(d => new Date(d.stat_date).getMonth() + 1 === m);
      let avg = null;
      let maxVal = null;
      if (arr.length) {
        const sum = arr.reduce((a, b) => a + b.utilization, 0);
        avg = sum / arr.length;
        maxVal = Math.max(...arr.map(d => d.utilization));
      }
      labels.push(m + '月');

      if (m > nowMonth) {
        real.push(null);
        forecast.push(avg);
      } else {
        real.push(avg);
        forecast.push(null);
      }
      // 最大稼働率（実績が存在する月だけ値を持つ）
      maxArr.push(maxVal);
    }

    // 年間チャート用に最大稼働率データは実績がある日だけプロット（予測月は null）
    const maxDataForYear = labels.map((_, idx) => {
      return (real[idx] !== null && real[idx] !== undefined) ? maxArr[idx] : null;
    });

    // 年間チャートは専用の描画（最大稼働率を含む）
    const ctx = document.getElementById('yearChart').getContext('2d');
    new Chart(document.getElementById('yearChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: '実績（平均）',
            data: real,
            borderColor: '#5c93ff',
            backgroundColor: gradient(ctx, "rgba(92,147,255,0.18)"),
            fill: true,
            tension: 0.35,
            borderWidth: 2,
            pointRadius: (c) => c.dataIndex === nowMonth - 1 ? 6 : 3,
            pointBackgroundColor: (c) => c.dataIndex === nowMonth - 1 ? '#ff6b6b' : '#5c93ff',
            pointBorderWidth: 2,
            pointBorderColor: '#fff'
          },
          {
            label: '予測',
            data: forecast,
            borderColor: '#ff6b6b',
            backgroundColor: gradient(ctx, "rgba(255,107,107,0.10)"),
            fill: true,
            borderDash: [6, 6],
            tension: 0.35,
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: '#fff',
            pointBorderColor: '#ff6b6b',
            pointBorderWidth: 1.5
          },
          {
            label: '最大稼働率',
            data: maxDataForYear,
            borderColor: '#2ecc71',
            backgroundColor: 'rgba(46, 204, 113, 0.05)',
            borderWidth: 2.5,
            pointRadius: 4,
            pointBackgroundColor: '#2ecc71',
            pointBorderColor: '#fff',
            pointBorderWidth: 1.5,
            tension: 0.2,
            fill: false,
            borderDash: [4, 4]
          }
        ]
      },
      options: {
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            position: 'top',
            align: 'start',
            labels: {
              boxWidth: 10,
              usePointStyle: true,
              pointStyle: 'circle',
              font: { size: 10 }
            }
          },
          datalabels: {
            align: 'top',
            anchor: 'end',
            color: '#4b5563',
            font: { size: 9, weight: '700' },
            formatter: v => (v !== null && v !== undefined) ? v.toFixed(1) + '%' : ''
          }
        },
        scales: {
          x: {
            grid: { color: '#eef2f7' },
            ticks: { font: { size: 9 } }
          },
          y: {
            beginAtZero: true,
            grid: { color: '#eef2f7' },
            ticks: { callback: v => v + '%', font: { size: 9 } }
          }
        }
      },
      plugins: [ChartDataLabels]
    });
  }

  // ---------- 月別カード描画（最大稼働率を追加） ----------
  function drawMonth(month, data) {
    const box = document.createElement("div");
    box.className = "card month-card";
    if (month === today.getMonth() + 1) box.classList.add("active");

    // 平均・最大を計算
    const avg = (data.reduce((a, b) => a + b.utilization, 0) / data.length);
    const maxVal = Math.max(...data.map(d => d.utilization));

    box.innerHTML = `
      <div class="month-header">
        <div class="month-title">${month} 月</div>
        ${month === today.getMonth() + 1 ? '<div class="month-badge">今月</div>' : ''}
      </div>
      <div class="chart-box"><canvas></canvas></div>
      <div class="info-row">
        <div class="info-box">
          <div class="info-label">平均稼働率</div>
          <div class="info-value blue">${avg.toFixed(1)}%</div>
        </div>
        <div class="info-box">
          <div class="info-label">最大稼働率</div>
          <div class="info-value green">${maxVal.toFixed(1)}%</div>
        </div>
      </div>
    `;
    document.getElementById('charts').appendChild(box);

    const canvas = box.querySelector("canvas");
    data.sort((a, b) => new Date(a.stat_date) - new Date(b.stat_date));

    const labels = [];
    const real = [];
    const forecast = [];
    const maxArr = [];  // 各日の最大稼働率（同日は最大値を取得するため、同じ日付が複数ある場合を考慮）
    let highlightIndex = -1;

    // 日付ごとにグループ化（同日に複数データがある場合、最大値を取る）
    const dailyMap = new Map();
    data.forEach(d => {
      const date = new Date(d.stat_date);
      const key = date.toDateString();
      if (!dailyMap.has(key)) {
        dailyMap.set(key, { date, values: [] });
      }
      dailyMap.get(key).values.push(d.utilization);
    });

    const sortedDays = Array.from(dailyMap.values()).sort((a, b) => a.date - b.date);

    sortedDays.forEach((item, idx) => {
      const date = item.date;
      const day = date.getDate();
      const maxOfDay = Math.max(...item.values);
      labels.push(day);

      if (date > today) {
        real.push(null);
        forecast.push(maxOfDay);  // 予測値として最大値を利用（表示上は予測扱い）
      } else {
        real.push(maxOfDay);
        forecast.push(null);
      }
      maxArr.push(maxOfDay);

      if (date.getFullYear() === today.getFullYear() &&
          date.getMonth() === today.getMonth() &&
          date.getDate() === today.getDate()) {
        highlightIndex = idx;
      }
    });

    // 月別チャート生成（最大稼働率を含む）
    createChart(canvas, labels, real, forecast, maxArr, highlightIndex);
  }

  // ---------- セレクトボックス初期化 ----------
  function initSelect() {
    for (let i = 1; i <= 12; i++) {
      startMonth.add(new Option(i + "月", i));
      endMonth.add(new Option(i + "月", i));
    }
    const now = today.getMonth() + 1;
    startMonth.value = Math.max(1, now - 2);
    endMonth.value = Math.min(12, parseInt(startMonth.value) + 3);
  }

  // ---------- 照会ボタン ----------
  function search() {
    const s = parseInt(startMonth.value);
    const e = parseInt(endMonth.value);
    if (e < s) { alert("終了月が開始月より前です"); return; }
    if (e - s >= 4) { alert("最大4ヶ月まで表示可能です"); return; }
    render(s, e);
  }

  // ---------- レンダリング ----------
  function render(s, e) {
    const container = document.getElementById('charts');
    container.innerHTML = "";
    const g = group(allData);
    for (let m = s; m <= e; m++) {
      if (g[m]) drawMonth(m, g[m]);
    }
  }

  // ---------- 初期化 ----------
  async function init() {
    allData = await getData();
    drawYear(allData);
    initSelect();
    const now = today.getMonth() + 1;
    const s = Math.max(1, now - 2);
    const e = Math.min(12, s + 3);
    render(s, e);
  }

  init();
</script>

</body>
</html>
