<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>2026 稼动率 Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<style>

:root{

    --bg:#f5f7fb;
    --card:#ffffff;
    --border:#e7ebf2;

    --text:#18253d;
    --sub:#7d8799;

    --blue:#5c93ff;
    --green:#62c26f;
    --red:#ff6b6b;

    --shadow:
    0 2px 10px rgba(15,23,42,0.04);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:var(--bg);

    font-family:
    "Segoe UI",
    "Microsoft YaHei",
    sans-serif;

    color:var(--text);

    padding:14px;
}

/* =========================
   HEADER
========================= */

.header{

    display:flex;

    justify-content:space-between;

    align-items:flex-start;

    gap:12px;

    margin-bottom:14px;
}

.header-left h1{

    font-size:28px;

    font-weight:800;

    line-height:1;
}

.header-left p{

    margin-top:4px;

    color:var(--sub);

    font-size:11px;
}

.header-right{

    display:flex;

    align-items:center;

    gap:10px;

    flex-wrap:wrap;
}

.header-card{

    background:var(--card);

    border:1px solid var(--border);

    border-radius:10px;

    padding:10px 14px;

    box-shadow:var(--shadow);
}

.header-label{

    font-size:10px;

    color:var(--sub);

    margin-bottom:4px;
}

select{

    height:38px;

    border:1px solid var(--border);

    border-radius:10px;

    background:#fff;

    padding:0 12px;

    font-size:12px;

    color:#111827;

    min-width:100px;
}

button{

    height:38px;

    border:none;

    border-radius:10px;

    background:#1d3c78;

    color:#fff;

    padding:0 18px;

    font-size:12px;

    font-weight:700;

    cursor:pointer;

    transition:0.2s;
}

button:hover{

    opacity:0.92;
}

/* =========================
   WRAPPER
========================= */

.wrapper{

    width:100%;
}

/* =========================
   CARD
========================= */

.card{

    background:var(--card);

    border:1px solid var(--border);

    border-radius:14px;

    padding:14px;

    box-shadow:var(--shadow);
}

/* =========================
   YEAR CHART
========================= */

.year-card{

    margin-bottom:14px;
}

.year-title{

    font-size:15px;

    font-weight:800;

    margin-bottom:10px;
}

.year-chart{

    height:240px;
}

/* =========================
   GRID
========================= */

.grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:14px;
}

/* =========================
   MONTH CARD
========================= */

.month-card{

    position:relative;

    transition:0.25s;
}

.month-card.active{

    border:1px solid rgba(92,147,255,0.25);

    box-shadow:
    0 8px 24px rgba(92,147,255,0.12);

    transform:translateY(-2px);
}

.month-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:10px;
}

.month-title{

    font-size:14px;

    font-weight:800;
}

.month-badge{

    font-size:10px;

    color:#fff;

    background:var(--blue);

    padding:4px 8px;

    border-radius:999px;
}

.chart-box{

    height:220px;
}

/* =========================
   FOOTER INFO
========================= */

.info-row{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:10px;

    margin-top:10px;
}

.info-box{

    border:1px solid var(--border);

    border-radius:10px;

    padding:10px 12px;

    background:#fff;
}

.info-label{

    font-size:10px;

    color:var(--sub);

    margin-bottom:4px;
}

.info-value{

    font-size:18px;

    font-weight:800;
}

.info-value.blue{

    color:var(--blue);
}

.info-value.green{

    color:var(--green);
}

/* =========================
   MOBILE
========================= */

@media(max-width:1100px){

    .grid{

        grid-template-columns:1fr;
    }

    .header{

        flex-direction:column;
    }

    .header-right{

        width:100%;
    }
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

    <div class="header-left">

        <h1>
            2026 稼动率 Dashboard
        </h1>

        <p>
            Utilization Performance Overview
        </p>

    </div>

    <div class="header-right">

        <div class="header-card">

            <div class="header-label">
                开始月份
            </div>

            <select id="startMonth"></select>

        </div>

        <div class="header-card">

            <div class="header-label">
                结束月份
            </div>

            <select id="endMonth"></select>

        </div>

        <button onclick="search()">
            ↻ 查询数据
        </button>

    </div>

</div>

<div class="wrapper">

    <!-- YEAR -->

    <div class="card year-card">

        <div class="year-title">
            年度稼动率走势
        </div>

        <div class="year-chart">
            <canvas id="yearChart"></canvas>
        </div>

    </div>

    <!-- MONTH GRID -->

    <div class="grid" id="charts"></div>

</div>

<script>

const URL="https://ieijoczgnndiqmowadty.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllaWpvY3pnbm5kaXFtb3dhZHR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMDM4MzksImV4cCI6MjA4ODc3OTgzOX0.vkhnClBek5ZZvJfW9fZwRpKnAVRViTd3EJOsWOJNuwg";

let allData=[];

let today=new Date();

Chart.defaults.font.family =
"'Segoe UI','Microsoft YaHei'";

Chart.defaults.color = "#6b7280";

/* =========================
   FETCH
========================= */

async function getData(){

    let res =
    await fetch(
        `${URL}/rest/v1/utilization_daily?select=*`,
        {
            headers:{
                apikey:KEY,
                Authorization:"Bearer "+KEY
            }
        }
    );

    return await res.json();
}

/* =========================
   GROUP
========================= */

function group(data){

    let m={};

    data.forEach(d=>{

        let month =
        new Date(d.stat_date).getMonth()+1;

        if(!m[month]){

            m[month]=[];
        }

        m[month].push(d);
    });

    return m;
}

/* =========================
   GRADIENT
========================= */

function gradient(ctx,color){

    let g =
    ctx.createLinearGradient(0,0,0,260);

    g.addColorStop(0,color);

    g.addColorStop(
        1,
        "rgba(255,255,255,0)"
    );

    return g;
}

/* =========================
   CREATE CHART
========================= */

function createChart(
    canvas,
    labels,
    real,
    forecast,
    highlightIndex
){

    let ctx =
    canvas.getContext("2d");

    new Chart(canvas,{

        type:'line',

        data:{

            labels,

            datasets:[

                {
                    label:'实际',

                    data:real,

                    borderColor:'#5c93ff',

                    backgroundColor:
                    gradient(
                        ctx,
                        "rgba(92,147,255,0.18)"
                    ),

                    fill:true,

                    tension:0.35,

                    borderWidth:2,

                    pointRadius:(c)=>{

                        return c.dataIndex === highlightIndex
                        ? 6
                        : 3;
                    },

                    pointBackgroundColor:(c)=>{

                        return c.dataIndex === highlightIndex
                        ? '#ff6b6b'
                        : '#5c93ff';
                    },

                    pointBorderWidth:2,

                    pointBorderColor:'#fff'
                },

                {
                    label:'未来',

                    data:forecast,

                    borderColor:'#ff6b6b',

                    backgroundColor:
                    gradient(
                        ctx,
                        "rgba(255,107,107,0.10)"
                    ),

                    fill:true,

                    borderDash:[6,6],

                    tension:0.35,

                    borderWidth:2,

                    pointRadius:3,

                    pointBackgroundColor:'#fff',

                    pointBorderColor:'#ff6b6b',

                    pointBorderWidth:1.5
                }
            ]
        },

        options:{

            maintainAspectRatio:false,

            interaction:{
                mode:'index',
                intersect:false
            },

            plugins:{

                legend:{

                    position:'top',

                    align:'start',

                    labels:{

                        boxWidth:10,

                        usePointStyle:true,

                        pointStyle:'circle',

                        font:{
                            size:10
                        }
                    }
                },

                datalabels:{

                    align:'top',

                    anchor:'end',

                    color:'#4b5563',

                    font:{
                        size:9,
                        weight:'700'
                    },

                    formatter:v=>{

                        if(!v) return '';

                        return v.toFixed(1)+'%';
                    }
                }
            },

            scales:{

                x:{

                    grid:{
                        color:'#eef2f7'
                    },

                    ticks:{
                        font:{
                            size:9
                        }
                    }
                },

                y:{

                    beginAtZero:true,

                    grid:{
                        color:'#eef2f7'
                    },

                    ticks:{

                        callback:v=>v+'%',

                        font:{
                            size:9
                        }
                    }
                }
            }
        },

        plugins:[ChartDataLabels]
    });
}

/* =========================
   YEAR CHART
========================= */

function drawYear(data){

    let labels=[];
    let real=[];
    let forecast=[];

    let nowMonth =
    today.getMonth()+1;

    for(let m=1;m<=12;m++){

        let arr =
        data.filter(
            d=>
            new Date(d.stat_date)
            .getMonth()+1===m
        );

        let avg =
        arr.length
        ?
        arr.reduce(
            (a,b)=>
            a+b.utilization,
            0
        ) / arr.length
        :
        null;

        labels.push(m+'月');

        if(m>nowMonth){

            real.push(null);

            forecast.push(avg);

        }else{

            real.push(avg);

            forecast.push(null);
        }
    }

    createChart(
        document.getElementById('yearChart'),
        labels,
        real,
        forecast,
        nowMonth-1
    );
}

/* =========================
   MONTH CARD
========================= */

function drawMonth(month,data){

    let box =
    document.createElement("div");

    box.className =
    "card month-card";

    if(month===today.getMonth()+1){

        box.classList.add("active");
    }

    box.innerHTML =

    `
    <div class="month-header">

        <div class="month-title">
            ${month} 月
        </div>

        ${
            month===today.getMonth()+1
            ?
            '<div class="month-badge">当前月</div>'
            :
            ''
        }

    </div>

    <div class="chart-box">
        <canvas></canvas>
    </div>

    <div class="info-row">

        <div class="info-box">

            <div class="info-label">
                平均稼动率
            </div>

            <div class="info-value blue">
                ${
                    (
                        data.reduce(
                            (a,b)=>a+b.utilization,
                            0
                        ) / data.length
                    ).toFixed(1)
                }%
            </div>

        </div>

        <div class="info-box">

            <div class="info-label">
                最大稼动率
            </div>

            <div class="info-value green">
                ${
                    Math.max(
                        ...data.map(
                            d=>d.utilization
                        )
                    ).toFixed(1)
                }%
            </div>

        </div>

    </div>
    `;

    charts.appendChild(box);

    let canvas =
    box.querySelector("canvas");

    data.sort(
        (a,b)=>
        new Date(a.stat_date)
        -
        new Date(b.stat_date)
    );

    let labels=[];
    let real=[];
    let forecast=[];

    let highlightIndex=-1;

    data.forEach((d,i)=>{

        let date =
        new Date(d.stat_date);

        let day =
        date.getDate();

        labels.push(day);

        if(date > today){

            real.push(null);

            forecast.push(d.utilization);

        }else{

            real.push(d.utilization);

            forecast.push(null);
        }

        if(

            date.getFullYear()===today.getFullYear()
            &&
            date.getMonth()===today.getMonth()
            &&
            date.getDate()===today.getDate()

        ){

            highlightIndex=i;
        }
    });

    createChart(
        canvas,
        labels,
        real,
        forecast,
        highlightIndex
    );
}

/* =========================
   SELECT
========================= */

function initSelect(){

    for(let i=1;i<=12;i++){

        startMonth.add(
            new Option(i+"月",i)
        );

        endMonth.add(
            new Option(i+"月",i)
        );
    }

    let now =
    today.getMonth()+1;

    startMonth.value =
    Math.max(1,now-2);

    endMonth.value =
    Math.min(
        12,
        parseInt(startMonth.value)+3
    );
}

/* =========================
   SEARCH
========================= */

function search(){

    let s =
    parseInt(startMonth.value);

    let e =
    parseInt(endMonth.value);

    if(e<s){

        alert("结束月份错误");

        return;
    }

    if(e-s>=4){

        alert("最多显示4个月");

        return;
    }

    render(s,e);
}

/* =========================
   RENDER
========================= */

function render(s,e){

    charts.innerHTML="";

    let g =
    group(allData);

    for(let m=s;m<=e;m++){

        if(g[m]){

            drawMonth(
                m,
                g[m]
            );
        }
    }
}

/* =========================
   INIT
========================= */

async function init(){

    allData =
    await getData();

    drawYear(allData);

    initSelect();

    let now =
    today.getMonth()+1;

    let s =
    Math.max(1,now-2);

    let e =
    Math.min(12,s+3);

    render(s,e);
}

init();

</script>

</body>
</html>
